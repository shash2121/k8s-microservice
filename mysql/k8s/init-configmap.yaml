apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-sql
  labels:
    app: mysql
  # The ConfigMap contains the SQL scripts that will be executed on startup
  # MySQL's official image automatically runs any *.sql files placed in
  # /docker-entrypoint-initdb.d/ the first time the container starts.
  #
  # Both the main schema and the analytics schema are provided.

data:
  schema.sql: |
    -- ShopHub MySQL Schema
    CREATE DATABASE IF NOT EXISTS shophub;
    USE shophub;
    CREATE TABLE users (
      id VARCHAR(36) PRIMARY KEY,
      name VARCHAR(255) NOT NULL,
      email VARCHAR(255) UNIQUE NOT NULL,
      password_hash VARCHAR(255) NOT NULL,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
      INDEX idx_email (email)
    );
    CREATE TABLE user_addresses (
      address_id VARCHAR(36) PRIMARY KEY,
      user_id VARCHAR(36) NOT NULL,
      address_line1 VARCHAR(255) NOT NULL,
      address_line2 VARCHAR(255),
      city VARCHAR(100) NOT NULL,
      state VARCHAR(100) NOT NULL,
      zip_code VARCHAR(20) NOT NULL,
      country VARCHAR(100) NOT NULL,
      is_default BOOLEAN DEFAULT FALSE,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP,
      FOREIGN KEY (user_id) REFERENCES users(id) ON DELETE CASCADE,
      INDEX idx_user_id (user_id)
    );
    CREATE TABLE orders (
      order_id VARCHAR(36) PRIMARY KEY,
      user_id VARCHAR(36) NOT NULL,
      status ENUM('pending','processing','completed','cancelled','confirmed') DEFAULT 'confirmed',
      subtotal DECIMAL(10,2) NOT NULL,
      discount DECIMAL(10,2) DEFAULT 0,
      discount_code VARCHAR(50),
      tax_amount DECIMAL(10,2),
      shipping_cost DECIMAL(10,2) DEFAULT 0,
      shipping_address TEXT,
      payment_method VARCHAR(50),
      payment_status ENUM('pending','completed','failed') DEFAULT 'completed',
      total DECIMAL(10,2) NOT NULL,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      INDEX idx_user_id (user_id),
      INDEX idx_status (status)
    );
    CREATE TABLE order_items (
      id VARCHAR(36) PRIMARY KEY,
      order_id VARCHAR(36) NOT NULL,
      product_id VARCHAR(36) NOT NULL,
      name VARCHAR(255) NOT NULL,
      price DECIMAL(10,2) NOT NULL,
      quantity INT NOT NULL,
      subtotal DECIMAL(10,2) NOT NULL,
      image VARCHAR(500),
      INDEX idx_order_id (order_id),
      FOREIGN KEY (order_id) REFERENCES orders(order_id) ON DELETE CASCADE
    );
  analytics.sql: |
    CREATE DATABASE IF NOT EXISTS analytics;
    USE analytics;
    CREATE TABLE IF NOT EXISTS events (
      id BIGINT UNSIGNED AUTO_INCREMENT PRIMARY KEY,
      event_name VARCHAR(50) NOT NULL,
      exchange_name VARCHAR(100) NOT NULL,
      routing_key VARCHAR(100) NOT NULL,
      payload JSON NOT NULL,
      received_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      order_id VARCHAR(36) NULL,
      user_id VARCHAR(36) NULL,
      total_amount DECIMAL(12,2) NULL,
      processed BOOLEAN DEFAULT FALSE,
      processed_at TIMESTAMP NULL,
      processing_error TEXT NULL,
      CONSTRAINT uq_event_unique UNIQUE (event_name, exchange_name, routing_key, order_id, user_id)
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
